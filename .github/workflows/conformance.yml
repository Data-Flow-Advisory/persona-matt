name: conformance

# Conformance check — validate that organ.py exists, has a decide() function
# that returns {output, rationale, self_metric} with self_metric.confidence,
# and that samples/*.json can be processed successfully.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  conformance:
    runs-on: [self-hosted, dfa-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check organ.py exists at root
        run: |
          if [ ! -f organ.py ]; then
            echo "ERROR: organ.py not found at repository root"
            exit 1
          fi
          echo "✓ organ.py found at root"

      - name: Check samples directory
        run: |
          if [ ! -d samples ]; then
            echo "ERROR: samples/ directory not found"
            exit 1
          fi
          sample_count=$(ls samples/*.json 2>/dev/null | wc -l)
          if [ "$sample_count" -eq 0 ]; then
            echo "ERROR: No .json sample files found in samples/"
            exit 1
          fi
          echo "✓ Found $sample_count sample JSON files"

      - name: Run conformance tests on all samples
        run: |
          set -euo pipefail
          echo "# Conformance Check — persona-matt" >> "$GITHUB_STEP_SUMMARY"

          failed_count=0
          for sample in samples/*.json; do
            echo "## Testing: $(basename "$sample")" >> "$GITHUB_STEP_SUMMARY"
            sample_name=$(basename "$sample" .json)

            # Run organ.py with the sample
            output=$(ORGAN_INPUT="$sample" python3 organ.py 2>&1) || {
              echo "### ✗ FAILED to execute" >> "$GITHUB_STEP_SUMMARY"
              echo "Error: $output" >> "$GITHUB_STEP_SUMMARY"
              ((failed_count++))
              continue
            }

            # Validate JSON structure
            if ! echo "$output" | python3 -m json.tool > /dev/null 2>&1; then
              echo "### ✗ FAILED: output is not valid JSON" >> "$GITHUB_STEP_SUMMARY"
              echo "\`\`\`\n$output\n\`\`\`" >> "$GITHUB_STEP_SUMMARY"
              ((failed_count++))
              continue
            fi

            # Validate required fields
            has_output=$(echo "$output" | python3 -c "import sys, json; d=json.load(sys.stdin); print('output' in d)" 2>/dev/null || echo "false")
            has_rationale=$(echo "$output" | python3 -c "import sys, json; d=json.load(sys.stdin); print('rationale' in d)" 2>/dev/null || echo "false")
            has_self_metric=$(echo "$output" | python3 -c "import sys, json; d=json.load(sys.stdin); print('self_metric' in d)" 2>/dev/null || echo "false")

            if [ "$has_output" = "True" ] && [ "$has_rationale" = "True" ] && [ "$has_self_metric" = "True" ]; then
              # Validate self_metric.confidence exists
              has_confidence=$(echo "$output" | python3 -c "import sys, json; d=json.load(sys.stdin); print('confidence' in d.get('self_metric', {}))" 2>/dev/null || echo "false")

              if [ "$has_confidence" = "True" ]; then
                echo "### ✓ PASSED" >> "$GITHUB_STEP_SUMMARY"
                printf '```json\n%s\n```\n' "$output" >> "$GITHUB_STEP_SUMMARY"
              else
                echo "### ✗ FAILED: self_metric.confidence not found" >> "$GITHUB_STEP_SUMMARY"
                printf '```json\n%s\n```\n' "$output" >> "$GITHUB_STEP_SUMMARY"
                ((failed_count++))
              fi
            else
              echo "### ✗ FAILED: Missing required fields (output=$has_output, rationale=$has_rationale, self_metric=$has_self_metric)" >> "$GITHUB_STEP_SUMMARY"
              printf '```json\n%s\n```\n' "$output" >> "$GITHUB_STEP_SUMMARY"
              ((failed_count++))
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$failed_count" -eq 0 ]; then
            echo "## ✓ All conformance checks PASSED" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          else
            echo "## ✗ $failed_count conformance check(s) FAILED" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Run tests
        run: |
          python -m pip install --quiet pytest
          python -m pytest -q . || true